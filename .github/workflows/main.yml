name: Build for Multiple Archs

on:
  push:
    tags: [ "v*" ]
  workflow_dispatch:

permissions:
  contents: write  

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: mipsel_24kc
            target: ramips
            subtarget: mt7621
          - arch: mips_24kc
            target: ath79
            subtarget: generic
          - arch: x86_64
            target: x86
            subtarget: 64
          - arch: aarch64_generic
            target: rockchip
            subtarget: armv8

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive # 必须添加，ZLMediaKit 强依赖子模块

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev gawk git gettext libssl-dev xsltproc wget unzip qemu-utils

      - name: Download and Setup SDK
        run: |
          SDK_URL="https://downloads.openwrt.org/releases/23.05.5/targets/${{ matrix.target }}/${{ matrix.subtarget }}/"
          SDK_FILE=$(wget -qO- $SDK_URL | grep -oE "openwrt-sdk-[^>]*Linux-x86_64.tar.xz" | head -n 1)
          wget -q "${SDK_URL}${SDK_FILE}"
          echo "正在解压: $SDK_FILE"
          tar -xJf *.tar.xz
          SDK_DIR=$(find . -maxdepth 1 -type d -name "openwrt-sdk-*" | head -n 1)
          mv "$SDK_DIR" openwrt-sdk

      - name: Compile Package
        run: |
          cd openwrt-sdk
          # 1. 创建包目录
          mkdir -p package/zlmediakit
          # 2. 拷贝 Makefile
          cp ../Makefile package/zlmediakit/Makefile
          # 3. 准备源码（如果是通过本地源码编译逻辑）
          # 注意：如果在 Makefile 里写了 PKG_SOURCE_PROTO:=git，这一步其实可以省略
          mkdir -p package/zlmediakit/src
          cp -r ../* package/zlmediakit/src/ 2>/dev/null || true
          
          # 4. 更新 feeds 并安装依赖库的源代码
          ./scripts/feeds update -a
          ./scripts/feeds install libopenssl zlib libstdcpp libsrtp2
          
          make defconfig
          # 仅编译 ZLMediaKit 及其依赖
          make package/zlmediakit/compile V=s -j$(nproc)

      - name: Organize Artifacts
        run: |
          mkdir -p ./deploy
          # 注意：find 命令的搜索路径取决于 SDK 的 bin 目录结构
          find openwrt-sdk/bin/packages/ -name "zlmediakit*.ipk" -exec cp {} ./deploy/ \;
          if [ -z "$(ls -A ./deploy)" ]; then
            echo "::error::No ipk files were produced!"
            exit 1
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zlmediakit-${{ matrix.arch }}
          path: ./deploy/*.ipk

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release-assets
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./release-assets/*.ipk
          body: |
            ## ZLMediaKit 多架构自动编译版本
            架构列表：
            - mipsel_24kc (MT7621)
            - mips_24kc (Ath79)
            - x86_64
            - aarch64 (Rockchip)
          generate_release_notes: false
